<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HomeRent - Find Your Perfect Home</title>
    <!-- Font Awesome & Google Fonts -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/home.css">
</head>

<body>
    <!-- Navbar (same across pages) -->
    <nav class="navbar">
        <div class="container nav-container">
            <a href="index.html" class="logo">ET-HomeRent</a>
            <ul class="nav-menu" id="nav-menu">
                <li><a href="index.html" class="active">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="feedback.html">Feedback</a></li>
                <li><a href="login.html">Login</a></li>
            </ul>
            <div class="hamburger" id="hamburger">
                <span></span><span></span><span></span>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <header class="hero">
        <div class="hero-content">
            <h1 class="animate-on-scroll">Find Your Dream Home Today</h1>
            <p class="animate-on-scroll">Explore thousands of rental properties with just one click.</p>
            <a href="#houses" class="btn btn-primary animate-on-scroll">Browse Houses</a>
        </div>
    </header>

    <!-- Houses Listing Section -->
    <section id="houses" class="houses-section">
        <div class="container">
            <h2 class="section-title animate-on-scroll">Available Rentals</h2>
            <div class="houses-grid" id="houses-grid">
                <!-- Cards will be injected by JavaScript -->
            </div>
        </div>
    </section>

    <!-- Modal for Property Details -->
    <div id="propertyModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <div class="modal-body" id="modal-body">
                <!-- Dynamic content -->
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 HomeRent. All rights reserved.</p>
        </div>
    </footer>

    <!-- JavaScript -->
    <script src="js/houses.js"></script>
    <script src="js/animations.js"></script>
    <script src="js/main.js"></script>
    <script src="js/navbar.js"></script>
</body>

</html>
