<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HomeRent - Feedback</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/feedback.css">
</head>

<body>
    <nav class="navbar">
        <div class="container nav-container">
            <a href="index.html" class="logo">ET-HomeRent</a>
            <ul class="nav-menu" id="nav-menu">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="feedback.html" class="active">Feedback</a></li>
                <li><a href="login.html">Login</a></li>
            </ul>
            <div class="hamburger" id="hamburger">
                <span></span><span></span><span></span>
            </div>
        </div>
    </nav>

    <main class="feedback-main">
        <div class="container feedback-container">
            <div class="feedback-form-wrapper animate-on-scroll">
                <h2>We Value Your Feedback</h2>
                <form id="feedbackForm">
                    <div class="form-group">
                        <label for="feedbackName">Name</label>
                        <input type="text" id="feedbackName" required>
                    </div>
                    <div class="form-group">
                        <label for="feedbackEmail">Email</label>
                        <input type="email" id="feedbackEmail" required>
                    </div>
                    <div class="form-group">
                        <label for="feedbackMessage">Message</label>
                        <textarea id="feedbackMessage" rows="5" required></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary">Submit Feedback</button>
                </form>
            </div>
            <div class="feedback-list-wrapper animate-on-scroll">
                <h3>Recent Feedback</h3>
                <div id="feedbackList" class="feedback-list">
                    <!-- Dynamically populated -->
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 ET-HomeRent. All rights reserved.</p>
        </div>
    </footer>

    <script src="js/navbar.js"></script>
    <script src="js/animations.js"></script>
    <script src="js/feedback.js"></script>
</body>

</html>
